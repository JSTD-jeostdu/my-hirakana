<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>手書き글꼴 — 손글씨 폰트 제작</title>
<style>
  :root {
    --color-bg: #faf7f0;
    --color-canvas-bg: #ffffff;
    --color-border: #c9b8a3;
    --color-guide: #e5dccb;
    --color-accent: #d94f30;
    --color-ink: #1a1a1a;
    --color-text: #3a342c;
    --color-text-muted: #8a7d6a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: "Pretendard", "Noto Sans KR", sans-serif;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    padding: 12px 24px;
  }

  .header-logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-accent);
    flex-shrink: 0;
  }

  .header-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1 1 240px;
    min-width: 200px;
  }

  .progress-bar {
    flex: 1 1 120px;
    height: 8px;
    background: var(--color-guide);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--color-accent);
    transition: width 0.2s ease;
  }

  .progress-text {
    font-size: 13px;
    color: var(--color-text-muted);
    white-space: nowrap;
  }

  @keyframes progressFlash {
    0% { color: var(--color-accent); }
    100% { color: var(--color-text-muted); }
  }

  .progress-text.flash {
    animation: progressFlash 0.5s ease;
  }

  .autosave-status {
    font-size: 12px;
    color: var(--color-text-muted);
    white-space: nowrap;
  }

  .header-reset {
    width: auto;
    padding: 8px 14px;
    font-size: 13px;
    flex-shrink: 0;
  }

  .quota-banner {
    background: #fdecea;
    color: #a13a2c;
    padding: 8px 24px;
    font-size: 13px;
    text-align: center;
  }

  .app-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 24px 0;
  }

  .group-tabs {
    flex: 0 0 140px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .group-tab {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    color: var(--color-text);
    text-align: left;
  }

  .group-tab .group-count {
    color: var(--color-text-muted);
    font-variant-numeric: tabular-nums;
  }

  .group-tab.active {
    border-color: var(--color-accent);
    color: var(--color-accent);
    font-weight: 600;
  }

  .main-content {
    flex: 1 1 auto;
    min-width: 0;
  }

  .prompt {
    margin-bottom: 16px;
  }

  .prompt h2 {
    margin: 0 0 4px;
    font-size: 22px;
  }

  .prompt p {
    margin: 0;
    color: var(--color-text-muted);
    font-size: 14px;
  }

  .workspace {
    display: flex;
    gap: 32px;
    align-items: flex-start;
  }

  .canvas-wrap {
    flex: 0 0 auto;
    width: min(480px, 100%);
  }

  #kanaCanvas {
    display: block;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--color-canvas-bg);
    border: 2px solid var(--color-border);
    border-radius: 4px;
    touch-action: none;
    cursor: crosshair;
  }

  .controls {
    flex: 1 1 200px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-width: 180px;
  }

  .control-group h3 {
    margin: 0 0 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text-muted);
  }

  .brush-options {
    display: flex;
    gap: 8px;
  }

  .brush-option {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 6px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    background: #fff;
  }

  .brush-option input {
    accent-color: var(--color-accent);
    margin: 0;
  }

  .brush-option.active {
    border-color: var(--color-accent);
    color: var(--color-accent);
    font-weight: 600;
  }

  button.action-btn {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    background: #fff;
    color: var(--color-text);
    font-size: 14px;
    cursor: pointer;
  }

  button.action-btn:hover:not(:disabled) {
    border-color: var(--color-accent);
    color: var(--color-accent);
  }

  button.action-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .hint {
    margin-top: 24px;
    font-size: 13px;
    color: var(--color-text-muted);
    line-height: 1.6;
  }

  .nav-buttons {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .nav-buttons .action-btn {
    width: auto;
    padding: 10px 20px;
  }

  .all-complete-banner {
    color: var(--color-accent);
    font-weight: 600;
    font-size: 14px;
    margin: 0;
  }

  .glyph-grid-section {
    max-width: 960px;
    margin: 24px auto 0;
    padding: 0 24px 40px;
  }

  .glyph-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .glyph-cell {
    position: relative;
    width: 60px;
    height: 60px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    background: #fff;
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .glyph-cell.empty {
    background: #f1ece2;
  }

  .glyph-cell.empty .glyph-cell-char {
    color: #c3b9a8;
    font-size: 24px;
  }

  .glyph-cell.current {
    border-color: var(--color-accent);
    border-width: 2px;
  }

  .glyph-cell-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-accent);
  }

  .derived-panel-section {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 24px;
  }

  .derived-panel-toggle {
    width: 100%;
    text-align: left;
    padding: 10px 14px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    color: var(--color-text);
  }

  .derived-panel-toggle:hover {
    border-color: var(--color-accent);
  }

  .toggle-arrow {
    display: inline-block;
    width: 14px;
  }

  .derived-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .derived-cell {
    width: 60px;
    padding: 0 0 4px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .derived-cell.pending {
    background: #f1ece2;
  }

  .derived-cell.pending .derived-cell-char {
    color: #c3b9a8;
    font-size: 22px;
  }

  .derived-cell-glyph {
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .derived-cell-badge {
    font-size: 10px;
    color: var(--color-text-muted);
    white-space: nowrap;
  }

  .preview-section {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 48px;
  }

  .preview-title {
    font-size: 16px;
    margin: 0 0 12px;
  }

  .preview-size-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--color-text-muted);
  }

  .preview-size-row input[type="range"] {
    accent-color: var(--color-accent);
  }

  .preview-placeholder {
    color: var(--color-text-muted);
    font-size: 14px;
    font-style: italic;
    margin: 0 0 16px;
  }

  .preview-lines {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 20px;
  }

  .preview-line {
    overflow-x: auto;
    min-height: 1px;
  }

  .preview-free-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .preview-free-input {
    padding: 10px 12px;
    border: 1px solid var(--color-border);
    border-radius: 6px;
    font-size: 14px;
    background: #fff;
    color: var(--color-text);
  }

  .preview-line-free {
    min-height: 24px;
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%) translateY(12px);
    background: #2b2721;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 1000;
    white-space: nowrap;
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 720px) {
    .app-layout {
      flex-direction: column;
      padding: 12px 16px 0;
    }
    .group-tabs {
      flex-direction: row;
      overflow-x: auto;
      width: 100%;
      flex: none;
      padding-bottom: 4px;
    }
    .group-tab {
      flex: 0 0 auto;
      white-space: nowrap;
    }
    .workspace {
      flex-direction: column;
    }
    .canvas-wrap {
      width: 100%;
    }
    .controls {
      width: 100%;
      flex-direction: row;
      flex-wrap: wrap;
    }
    .control-group {
      flex: 1 1 140px;
    }
    .glyph-grid-section,
    .derived-panel-section,
    .preview-section {
      padding-left: 16px;
      padding-right: 16px;
    }
    header {
      padding: 12px 16px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">手書き글꼴</div>
  <div class="header-progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-text" id="progressText">기본 157자 중 0자</span>
    <span class="autosave-status" id="autosaveStatus"></span>
  </div>
  <button class="action-btn header-reset" id="resetAllBtn">전체 초기화</button>
</header>

<div class="quota-banner" id="quotaBanner" hidden>저장 공간이 부족합니다. 백업 기능은 다음 업데이트에서 제공됩니다.</div>

<div class="app-layout">
  <nav class="group-tabs" id="groupTabs"></nav>

  <div class="main-content">
    <div class="prompt">
      <h2># 지금 쓸 글자: <span id="currentChar">あ</span></h2>
      <p id="charHint">칸 가운데에 크게 써 주세요. 획 순서는 자유입니다.</p>
    </div>

    <div class="workspace">
      <div class="canvas-wrap">
        <canvas id="kanaCanvas"></canvas>
      </div>

      <div class="controls">
        <div class="control-group">
          <h3>붓 두께</h3>
          <div class="brush-options" id="brushOptions">
            <label class="brush-option" data-size="thin">
              <input type="radio" name="brushSize" value="thin"> 얇게
            </label>
            <label class="brush-option active" data-size="normal">
              <input type="radio" name="brushSize" value="normal" checked> 보통
            </label>
            <label class="brush-option" data-size="thick">
              <input type="radio" name="brushSize" value="thick"> 굵게
            </label>
          </div>
        </div>

        <div class="control-group">
          <h3>지우기</h3>
          <button class="action-btn" id="undoBtn" disabled>한 획 지우기</button>
          <br><br>
          <button class="action-btn" id="clearAllBtn" disabled>전부 지우기</button>
        </div>
      </div>
    </div>

    <div class="nav-buttons">
      <button class="action-btn" id="prevCharBtn">← 이전 글자</button>
      <button class="action-btn" id="nextCharBtn">다음 글자 →</button>
      <p class="all-complete-banner" id="allCompleteBanner" hidden>기본 글자를 모두 썼습니다! 🎉</p>
    </div>

    <p class="hint">
      두께는 새로 긋는 획부터 적용됩니다.<br>
      이미 그린 획은 지우고 다시 쓰면 돼요.
    </p>
  </div>
</div>

<div class="glyph-grid-section">
  <div class="glyph-grid" id="glyphGrid"></div>
</div>

<div class="derived-panel-section">
  <button type="button" class="derived-panel-toggle" id="derivedPanelToggle">
    <span class="toggle-arrow">▸</span>자동 합성 69자 · 기본 글자를 쓰면 여기에 나타납니다
  </button>
  <div class="derived-grid" id="derivedGrid" hidden></div>
</div>

<div class="preview-section">
  <h3 class="preview-title">미리보기 — 쓰는 순간 당신의 글씨로 바뀝니다</h3>
  <div class="preview-size-row">
    <label for="previewSizeSlider">크기</label>
    <input type="range" id="previewSizeSlider">
    <span id="previewSizeValue"></span>
  </div>
  <p class="preview-placeholder" id="previewPlaceholder">자모를 쓰기 시작하면 여기에서 당신의 글씨로 문장이 보입니다</p>
  <div class="preview-lines" id="previewLines" hidden></div>
  <div class="preview-free-row" id="previewFreeRow" hidden>
    <input type="text" id="previewFreeInput" class="preview-free-input" placeholder="아무 문장이나 입력해보세요">
    <div class="preview-line preview-line-free" id="previewFreeLine"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── 설정값: 모든 튜닝 상수를 이곳에 모아 관리 ──
  const CONFIG = {
    LOGICAL_SIZE: 640,            // 캔버스 논리 좌표계 크기 (정사각)
    MAX_DISPLAY_SIZE: 480,        // 캔버스 최대 화면 표시 크기 (px)
    BRUSH_SIZES: { thin: 12, normal: 18, thick: 26 },  // 붓 두께 (논리 px)
    SMOOTHING_MIN_DIST: 1.5,      // 이 거리(논리 px) 미만 이동은 무시해 점 수 절약
    CLEAR_CONFIRM_THRESHOLD: 3,   // 전부 지우기 시 confirm()을 띄우는 최소 획 수
    SAVE_DEBOUNCE_MS: 1000,       // 자동 저장 디바운스
    DP_EPSILON: 1.5,              // Douglas-Peucker 단순화 허용 오차 (논리 px)
    GRID_CELL_SIZE: 60,           // 글자 그리드 셀 크기 (px)
    PREVIEW_REF_PX: 256,          // 미리보기 글자 캐시 기준 해상도 (1em = 이 값 px) — 슬라이더 범위(24~72)보다 항상 커서 확대해도 흐려지지 않음
    PREVIEW_DEBOUNCE_MS: 300,     // 미리보기 리렌더 디바운스
    PREVIEW_MIN_SIZE: 24,
    PREVIEW_MAX_SIZE: 72,
    PREVIEW_DEFAULT_SIZE: 40,
    TOAST_DURATION_MS: 1800,
    COLORS: {
      guide: '#e5dccb',
      ink: '#1a1a1a'
    }
  };

  // ── 문자 세트 정의: 이 순서가 곧 기본 진행 순서 ──
  const CHARSET = [
    { id: 'hiragana', label: 'ひらがな', chars: [...'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん'] },
    { id: 'katakana', label: 'カタカナ', chars: [...'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン'] },
    { id: 'digit',    label: '123',      chars: [...'0123456789'] },
    { id: 'upper',    label: 'ABC',      chars: [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'] },
    { id: 'lower',    label: 'abc',      chars: [...'abcdefghijklmnopqrstuvwxyz'] },
    { id: 'mark',     label: '부호',      chars: ['゛', '゜', 'ー'] },
  ];

  const ALL_CHARS = CHARSET.flatMap((g) => g.chars);

  const CHAR_TO_GROUP = new Map();
  for (const g of CHARSET) {
    for (const c of g.chars) CHAR_TO_GROUP.set(c, g.id);
  }

  // ── 파생 글자 정의: 문자열 쌍을 zip해서 오타 없이 생성 ──
  const DAKUTEN_PAIRS = [
    ['かきくけこさしすせそたちつてとはひふへほ', 'がぎぐげござじずぜぞだぢづでどばびぶべぼ'], // 히라가나 20
    ['カキクケコサシスセソタチツテトハヒフヘホウ', 'ガギグゲゴザジズゼゾダヂヅデドバビブベボヴ'], // 가타카나 21 (ウ→ヴ 포함)
  ];
  const HANDAKUTEN_PAIRS = [
    ['はひふへほ', 'ぱぴぷぺぽ'],   // 히라가나 5
    ['ハヒフヘホ', 'パピプペポ'],   // 가타카나 5
  ];
  const SMALL_PAIRS = [
    ['あいうえおやゆよつ', 'ぁぃぅぇぉゃゅょっ'],   // 히라가나 9
    ['アイウエオヤユヨツ', 'ァィゥェォャュョッ'],   // 가타카나 9
  ];

  function buildDerivedTable() {
    const table = {};
    function zip(pairs, kind) {
      for (const [baseStr, derivedStr] of pairs) {
        const bases = [...baseStr];
        const deriveds = [...derivedStr];
        for (let i = 0; i < deriveds.length; i++) {
          table[deriveds[i]] = { base: bases[i], kind };
        }
      }
    }
    zip(DAKUTEN_PAIRS, 'dakuten');
    zip(HANDAKUTEN_PAIRS, 'handakuten');
    zip(SMALL_PAIRS, 'small');
    return table;
  }
  const DERIVED = buildDerivedTable(); // char -> { base, kind }

  // 역방향 의존 인덱스: 이 글자(재료)가 바뀌면 영향받는 파생 글자 목록
  // (base 자신뿐 아니라 탁점 ゛/반탁점 ゜ 자체가 바뀔 때도 관련 파생 전체를 무효화해야 함)
  const DERIVED_DEPS = new Map();
  function addDerivedDep(trigger, derivedChar) {
    if (!DERIVED_DEPS.has(trigger)) DERIVED_DEPS.set(trigger, new Set());
    DERIVED_DEPS.get(trigger).add(derivedChar);
  }
  for (const derivedChar of Object.keys(DERIVED)) {
    const info = DERIVED[derivedChar];
    addDerivedDep(info.base, derivedChar);
    if (info.kind === 'dakuten') addDerivedDep('゛', derivedChar);
    if (info.kind === 'handakuten') addDerivedDep('゜', derivedChar);
  }

  // ── 합성 기하 규칙: 배율·오프셋 튜닝은 이 객체만 수정하면 됨 ──
  const COMPOSE_RULES = {
    // 탁음·반탁음 공통: 기본 글자를 살짝 줄여 좌하단에, 부호를 우상단 영역에
    voiced: {
      baseScale: 0.90,
      baseAnchor: [0, 640],                  // 좌하단 기준 축소 → 우상단에 부호 공간 확보
      markTargetRect: [396, 20, 610, 235],   // [x1, y1, x2, y2] 부호가 들어갈 영역
    },
    small: {
      scale: 0.62,
      anchor: [320, 640],                    // 하단 중앙 기준 축소 (가로쓰기 관행)
    },
  };

  // ── 전역 상태: 캔버스에 지금 떠 있는 작업본 ──
  const state = {
    brushSize: CONFIG.BRUSH_SIZES.normal,
    strokes: [],        // { w: number, pts: [[x, y], ...] }[]
    currentChar: 'あ'
  };

  // ── 프로젝트 데이터: localStorage에 저장되는 단위 ──
  const project = {
    version: 1,
    meta: { createdAt: 0, updatedAt: 0 },
    settings: { brushSize: CONFIG.BRUSH_SIZES.normal },
    glyphs: {},          // char -> { strokes, updatedAt }
    currentChar: 'あ'
  };

  // ── 저장 계층: localStorage 구현 ──
  const StorageAdapter = {
    KEY: 'tegaki-font-project-v1',
    save(proj) {
      localStorage.setItem(this.KEY, JSON.stringify(simplifyProjectForSave(proj)));
    },
    load() {
      try {
        const raw = localStorage.getItem(this.KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (err) {
        return null;
      }
    },
    clear() {
      localStorage.removeItem(this.KEY);
    }
  };

  // Douglas-Peucker 획 단순화 (재귀 없이 스택 방식 — 긴 획도 안전)
  function perpendicularDistance(p, a, b) {
    const [x, y] = p, [x1, y1] = a, [x2, y2] = b;
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return Math.hypot(x - x1, y - y1);
    const t = ((x - x1) * dx + (y - y1) * dy) / lenSq;
    const px = x1 + t * dx, py = y1 + t * dy;
    return Math.hypot(x - px, y - py);
  }

  function simplifyDouglasPeucker(points, epsilon) {
    if (points.length < 3) return points.slice();
    const keep = new Array(points.length).fill(false);
    keep[0] = true;
    keep[points.length - 1] = true;
    const stack = [[0, points.length - 1]];
    while (stack.length > 0) {
      const [start, end] = stack.pop();
      let maxDist = 0;
      let maxIdx = -1;
      for (let i = start + 1; i < end; i++) {
        const d = perpendicularDistance(points[i], points[start], points[end]);
        if (d > maxDist) { maxDist = d; maxIdx = i; }
      }
      if (maxDist > epsilon && maxIdx !== -1) {
        keep[maxIdx] = true;
        stack.push([start, maxIdx]);
        stack.push([maxIdx, end]);
      }
    }
    return points.filter((_, i) => keep[i]);
  }

  // 저장본만 단순화 — 화면 작업 중인 원본(project.glyphs)은 그대로 유지
  function simplifyProjectForSave(proj) {
    const glyphs = {};
    for (const char of Object.keys(proj.glyphs)) {
      const glyph = proj.glyphs[char];
      glyphs[char] = {
        strokes: glyph.strokes.map((s) => ({
          w: s.w,
          pts: simplifyDouglasPeucker(s.pts, CONFIG.DP_EPSILON).map((p) => [Math.round(p[0]), Math.round(p[1])])
        })),
        updatedAt: glyph.updatedAt
      };
    }
    return { version: proj.version, meta: proj.meta, settings: proj.settings, glyphs, currentChar: proj.currentChar };
  }

  // ── DOM 참조 ──
  const canvas = document.getElementById('kanaCanvas');
  const ctx = canvas.getContext('2d');
  const canvasWrap = document.querySelector('.canvas-wrap');
  const undoBtn = document.getElementById('undoBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const brushOptions = document.getElementById('brushOptions');
  const currentCharEl = document.getElementById('currentChar');
  const charHintEl = document.getElementById('charHint');
  const prevCharBtn = document.getElementById('prevCharBtn');
  const nextCharBtn = document.getElementById('nextCharBtn');
  const allCompleteBanner = document.getElementById('allCompleteBanner');
  const groupTabsEl = document.getElementById('groupTabs');
  const glyphGridEl = document.getElementById('glyphGrid');
  const progressFillEl = document.getElementById('progressFill');
  const progressTextEl = document.getElementById('progressText');
  const autosaveStatusEl = document.getElementById('autosaveStatus');
  const quotaBannerEl = document.getElementById('quotaBanner');
  const resetAllBtn = document.getElementById('resetAllBtn');
  const derivedPanelToggleEl = document.getElementById('derivedPanelToggle');
  const derivedGridEl = document.getElementById('derivedGrid');
  const toastEl = document.getElementById('toast');
  const previewSizeSliderEl = document.getElementById('previewSizeSlider');
  const previewSizeValueEl = document.getElementById('previewSizeValue');
  const previewPlaceholderEl = document.getElementById('previewPlaceholder');
  const previewLinesEl = document.getElementById('previewLines');
  const previewFreeRowEl = document.getElementById('previewFreeRow');
  const previewFreeInputEl = document.getElementById('previewFreeInput');
  const previewFreeLineEl = document.getElementById('previewFreeLine');

  // ── 순수 렌더 함수: 캔버스 코어(S1)와 동일, 썸네일·미리보기에서도 그대로 재사용 ──
  function drawSmoothStroke(ctx, pts, width) {
    ctx.lineWidth = width;
    if (pts.length === 0) return;
    if (pts.length === 1) {
      ctx.beginPath();
      ctx.arc(pts[0][0], pts[0][1], width / 2, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i][0] + pts[i + 1][0]) / 2;
      const my = (pts[i][1] + pts[i + 1][1]) / 2;
      ctx.quadraticCurveTo(pts[i][0], pts[i][1], mx, my);
    }
    ctx.lineTo(pts[pts.length - 1][0], pts[pts.length - 1][1]);
    ctx.stroke();
  }

  function renderStrokes(ctx, strokes, opts = {}) {
    const { scale = 1, offsetX = 0, offsetY = 0, color = CONFIG.COLORS.ink } = opts;
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (const stroke of strokes) {
      drawSmoothStroke(ctx, stroke.pts, stroke.w);
    }
    ctx.restore();
  }

  function drawGuide(ctx) {
    const size = CONFIG.LOGICAL_SIZE;
    ctx.save();
    ctx.strokeStyle = CONFIG.COLORS.guide;
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(size / 2, 0);
    ctx.lineTo(size / 2, size);
    ctx.moveTo(0, size / 2);
    ctx.lineTo(size, size / 2);
    ctx.stroke();
    ctx.restore();
  }

  function redrawAll() {
    ctx.clearRect(0, 0, CONFIG.LOGICAL_SIZE, CONFIG.LOGICAL_SIZE);
    drawGuide(ctx);
    renderStrokes(ctx, state.strokes, { color: CONFIG.COLORS.ink });
  }

  // ── 캔버스 좌표계 설정 (레티나 대응) ──
  function resizeCanvas() {
    const displaySize = Math.min(CONFIG.MAX_DISPLAY_SIZE, canvasWrap.clientWidth);
    const dpr = window.devicePixelRatio || 1;
    canvas.width = displaySize * dpr;
    canvas.height = displaySize * dpr;
    const scale = (displaySize * dpr) / CONFIG.LOGICAL_SIZE;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
    redrawAll();
  }

  // 포인터 이벤트 좌표 → 논리 좌표(0~640) 변환
  function toLogical(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CONFIG.LOGICAL_SIZE / rect.width);
    const y = (e.clientY - rect.top) * (CONFIG.LOGICAL_SIZE / rect.height);
    return [Math.round(x), Math.round(y)];
  }

  function dist(a, b) {
    return Math.hypot(a[0] - b[0], a[1] - b[1]);
  }

  // ── 드로잉 입력 처리 ──
  let activePointerId = null;
  let currentPts = [];
  let activeStrokeWidth = state.brushSize;
  let prevMid = null;

  function addPoint(p) {
    const last = currentPts[currentPts.length - 1];
    if (last && dist(last, p) < CONFIG.SMOOTHING_MIN_DIST) return;
    currentPts.push(p);

    const n = currentPts.length;
    if (n < 2) return;
    const ctrl = currentPts[n - 2];
    const newMid = [(ctrl[0] + p[0]) / 2, (ctrl[1] + p[1]) / 2];

    // 증분 렌더: 마지막 세그먼트만 그림 (전체 리렌더 없이)
    ctx.strokeStyle = CONFIG.COLORS.ink;
    ctx.lineWidth = activeStrokeWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(prevMid[0], prevMid[1]);
    ctx.quadraticCurveTo(ctrl[0], ctrl[1], newMid[0], newMid[1]);
    ctx.stroke();
    prevMid = newMid;
  }

  function updateButtonStates() {
    const hasStrokes = state.strokes.length > 0;
    undoBtn.disabled = !hasStrokes;
    clearAllBtn.disabled = !hasStrokes;
  }

  function onPointerDown(e) {
    if (activePointerId !== null) return; // 멀티터치: 첫 포인터만 인정
    activePointerId = e.pointerId;
    canvas.setPointerCapture(activePointerId);

    const p = toLogical(e);
    activeStrokeWidth = state.brushSize;
    currentPts = [p];
    prevMid = p;
  }

  function onPointerMove(e) {
    if (e.pointerId !== activePointerId) return;
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
    for (const ev of events) {
      addPoint(toLogical(ev));
    }
  }

  function finishStroke() {
    if (currentPts.length > 0) {
      state.strokes.push({ w: activeStrokeWidth, pts: currentPts });
    }
    currentPts = [];
    prevMid = null;
    activePointerId = null;
    redrawAll();
    updateButtonStates();
    syncCurrentGlyph();
  }

  function onPointerUp(e) {
    if (e.pointerId !== activePointerId) return;
    finishStroke();
  }

  function onPointerCancel(e) {
    if (e.pointerId !== activePointerId) return;
    finishStroke();
  }

  canvas.addEventListener('pointerdown', onPointerDown);
  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp);
  canvas.addEventListener('pointercancel', onPointerCancel);

  // ── 붓 두께 선택 ──
  function syncBrushSizeUI() {
    const sizeKey = Object.keys(CONFIG.BRUSH_SIZES).find((k) => CONFIG.BRUSH_SIZES[k] === state.brushSize) || 'normal';
    brushOptions.querySelectorAll('.brush-option').forEach((el) => {
      const match = el.dataset.size === sizeKey;
      el.classList.toggle('active', match);
      el.querySelector('input').checked = match;
    });
  }

  brushOptions.addEventListener('change', (e) => {
    const size = e.target.value;
    state.brushSize = CONFIG.BRUSH_SIZES[size];
    project.settings.brushSize = state.brushSize;
    brushOptions.querySelectorAll('.brush-option').forEach((el) => {
      el.classList.toggle('active', el.dataset.size === size);
    });
    scheduleSave();
  });

  // ── 한 획 지우기 ──
  function undoStroke() {
    if (state.strokes.length === 0) return;
    state.strokes.pop();
    redrawAll();
    updateButtonStates();
    syncCurrentGlyph();
  }
  undoBtn.addEventListener('click', undoStroke);

  // ── 전부 지우기 ──
  clearAllBtn.addEventListener('click', () => {
    if (state.strokes.length === 0) return;
    if (state.strokes.length >= CONFIG.CLEAR_CONFIRM_THRESHOLD) {
      if (!confirm('지금까지 쓴 획을 모두 지울까요?')) return;
    }
    state.strokes = [];
    redrawAll();
    updateButtonStates();
    syncCurrentGlyph();
  });

  // ── 단축키: Ctrl/Cmd+Z = 한 획 지우기, Enter/→ = 다음 글자, ← = 이전 글자 ──
  window.addEventListener('keydown', (e) => {
    const isUndoKey = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z';
    if (isUndoKey) {
      e.preventDefault();
      undoStroke();
      return;
    }
    if (activePointerId !== null) return; // 그리는 중에는 무시
    if (e.key === 'Enter' || e.key === 'ArrowRight') {
      e.preventDefault();
      goToNextChar();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      goToPrevChar();
    }
  });

  // ── 반응형 리사이즈 ──
  window.addEventListener('resize', resizeCanvas);

  // ── 글자별 안내 문구 ──
  function getHintHtml(char) {
    if (char === '゛') return '탁점입니다. か → が처럼 글자 오른쪽 위에 붙는 점 두 개를, <strong>칸 전체를 크게 사용해</strong> 써 주세요. (엔진이 알아서 줄여 배치합니다)';
    if (char === '゜') return '반탁점입니다. は → ぱ처럼 붙는 작은 동그라미를 <strong>칸 전체를 크게 사용해</strong> 써 주세요.';
    if (char === 'ー') return '장음 기호입니다. 가로로 길게 그어 주세요.';
    return '칸 가운데에 크게 써 주세요. 획 순서는 자유입니다.';
  }

  function updateCharUI() {
    currentCharEl.textContent = state.currentChar;
    charHintEl.innerHTML = getHintHtml(state.currentChar);
  }

  // ── 완료 글자 판정 / 진행률 ──
  function isCharDone(char) {
    const glyph = project.glyphs[char];
    return !!glyph && glyph.strokes.length > 0;
  }

  function getCompletedChars() {
    return ALL_CHARS.filter(isCharDone);
  }

  // ═══════════════════════════════════════════════════════════
  // 자동 합성 엔진
  // ═══════════════════════════════════════════════════════════

  // 획 데이터 복사본의 점 좌표에 변환 함수를 적용 (두께 w도 같은 배율로 스케일)
  function transformStrokes(strokes, pointFn, widthScale) {
    return strokes.map((s) => ({
      w: s.w * widthScale,
      pts: s.pts.map((p) => pointFn(p))
    }));
  }

  // 앵커 (ax, ay) 기준 균등 축소: x' = ax + (x-ax)*s, y' = ay + (y-ay)*s
  function scaleFromAnchor(strokes, scale, anchor) {
    const [ax, ay] = anchor;
    return transformStrokes(strokes, ([x, y]) => [ax + (x - ax) * scale, ay + (y - ay) * scale], scale);
  }

  function computeBBox(strokes) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const s of strokes) {
      for (const [x, y] of s.pts) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
    if (minX === Infinity) return null;
    return { minX, minY, maxX, maxY, width: maxX - minX, height: maxY - minY };
  }

  // 부호(゛/゜)의 실제 바운딩 박스를 구해 targetRect에 종횡비 유지로 fit + 중앙 정렬
  // (고정 배율이 아닌 이유: 사용자마다 부호를 쓰는 크기가 제각각이라서)
  function fitStrokesToRect(strokes, rect) {
    const bbox = computeBBox(strokes);
    if (!bbox) return strokes;
    const [rx1, ry1, rx2, ry2] = rect;
    const rectW = rx2 - rx1, rectH = ry2 - ry1;
    const bboxW = Math.max(bbox.width, 1);
    const bboxH = Math.max(bbox.height, 1);
    const scale = Math.min(rectW / bboxW, rectH / bboxH);
    const scaledW = bboxW * scale, scaledH = bboxH * scale;
    const offsetX = rx1 + (rectW - scaledW) / 2 - bbox.minX * scale;
    const offsetY = ry1 + (rectH - scaledH) / 2 - bbox.minY * scale;
    return transformStrokes(strokes, ([x, y]) => [x * scale + offsetX, y * scale + offsetY], scale);
  }

  // 파생 글자 하나를 합성. 준비 조건 미충족 시 null. 결과는 저장하지 않고 항상 재계산.
  function composeGlyph(char) {
    const info = DERIVED[char];
    if (!info) return null;
    const baseGlyph = project.glyphs[info.base];
    if (!baseGlyph || baseGlyph.strokes.length === 0) return null;

    if (info.kind === 'small') {
      const rules = COMPOSE_RULES.small;
      return scaleFromAnchor(baseGlyph.strokes, rules.scale, rules.anchor);
    }

    // dakuten / handakuten
    const markChar = info.kind === 'dakuten' ? '゛' : '゜';
    const markGlyph = project.glyphs[markChar];
    if (!markGlyph || markGlyph.strokes.length === 0) return null;
    const rules = COMPOSE_RULES.voiced;
    const baseStrokes = scaleFromAnchor(baseGlyph.strokes, rules.baseScale, rules.baseAnchor);
    const markStrokes = fitStrokesToRect(markGlyph.strokes, rules.markTargetRect);
    return [...baseStrokes, ...markStrokes];
  }

  // 합성 결과 캐시 — onGlyphChange에서 영향받는 글자만 골라 무효화 (전체 무효화 금지)
  const composedCache = new Map(); // char -> strokes | null

  function getComposedStrokes(char) {
    if (composedCache.has(char)) return composedCache.get(char);
    const result = composeGlyph(char);
    composedCache.set(char, result);
    return result;
  }

  // 우선순위: ① 직접 쓴 글자 → ② 합성 결과 (S5의 파생 글자 직접 덮어쓰기가 이 우선순위로 구현됨)
  function getGlyphStrokes(char) {
    const direct = project.glyphs[char];
    if (direct && direct.strokes.length > 0) return direct.strokes;
    return getComposedStrokes(char);
  }

  // 폰트에 렌더 가능한 전체 글자 목록 (직접 + 합성)
  function getAvailableChars() {
    const result = [];
    for (const c of ALL_CHARS) if (isCharDone(c)) result.push(c);
    for (const c of Object.keys(DERIVED)) if (getGlyphStrokes(c)) result.push(c);
    return result;
  }

  // char가 바뀌었을 때 무효화해야 할 전체 대상(자기 자신 + 이 글자를 재료로 쓰는 파생 글자들)
  function getAffectedChars(char) {
    const set = new Set([char]);
    const deps = DERIVED_DEPS.get(char);
    if (deps) for (const d of deps) set.add(d);
    return set;
  }

  function getProgressText() {
    const n = getCompletedChars().length;
    const m = getAvailableChars().length;
    return `기본 157자 중 ${n}자 · 폰트에 ${m}자 준비됨`;
  }

  let lastAvailableCount = 0;
  function updateProgressBar() {
    const n = getCompletedChars().length;
    const m = getAvailableChars().length;
    progressFillEl.style.width = `${(n / ALL_CHARS.length) * 100}%`;
    progressTextEl.textContent = getProgressText();
    // "적게 쓰고 많이 얻는다" 체감을 위한 강조 애니메이션 — M이 늘어날 때만
    if (m > lastAvailableCount) {
      progressTextEl.classList.remove('flash');
      void progressTextEl.offsetWidth; // 강제 리플로우로 애니메이션 재시작
      progressTextEl.classList.add('flash');
    }
    lastAvailableCount = m;
  }

  // ═══════════════════════════════════════════════════════════
  // 파생 글자 확인 패널 (읽기 전용)
  // ═══════════════════════════════════════════════════════════

  const derivedCellRefs = new Map(); // char -> { wrapper }

  function renderDerivedPanel() {
    derivedGridEl.innerHTML = '';
    derivedCellRefs.clear();
    for (const char of Object.keys(DERIVED)) {
      const wrapper = document.createElement('button');
      wrapper.type = 'button';
      wrapper.className = 'derived-cell';
      wrapper.addEventListener('click', () => showToast('직접 다듬는 기능은 곧 제공됩니다')); // S5 예정
      derivedGridEl.appendChild(wrapper);
      derivedCellRefs.set(char, { wrapper });
      renderDerivedCellContent(char);
    }
  }

  function renderDerivedCellContent(char) {
    const cell = derivedCellRefs.get(char);
    if (!cell) return;
    const wrapper = cell.wrapper;
    wrapper.innerHTML = '';

    const glyphBox = document.createElement('div');
    glyphBox.className = 'derived-cell-glyph';

    const strokes = getComposedStrokes(char);
    if (strokes) {
      const px = CONFIG.GRID_CELL_SIZE;
      const dpr = window.devicePixelRatio || 1;
      const thumb = document.createElement('canvas');
      thumb.width = px * dpr;
      thumb.height = px * dpr;
      thumb.style.width = px + 'px';
      thumb.style.height = px + 'px';
      renderStrokes(thumb.getContext('2d'), strokes, { scale: (px * dpr) / CONFIG.LOGICAL_SIZE });
      glyphBox.appendChild(thumb);
      wrapper.classList.add('ready');
      wrapper.classList.remove('pending');
    } else {
      const span = document.createElement('span');
      span.className = 'derived-cell-char';
      span.textContent = char;
      glyphBox.appendChild(span);
      wrapper.classList.add('pending');
      wrapper.classList.remove('ready');
    }
    wrapper.appendChild(glyphBox);

    const info = DERIVED[char];
    const badge = document.createElement('span');
    badge.className = 'derived-cell-badge';
    badge.textContent = info.kind === 'small' ? info.base : `${info.base}+${info.kind === 'dakuten' ? '゛' : '゜'}`;
    wrapper.appendChild(badge);
  }

  function updateDerivedPanelCells(affectedSet) {
    for (const c of affectedSet) {
      if (DERIVED[c]) renderDerivedCellContent(c);
    }
  }

  let derivedPanelExpanded = false;
  derivedPanelToggleEl.addEventListener('click', () => {
    derivedPanelExpanded = !derivedPanelExpanded;
    derivedGridEl.hidden = !derivedPanelExpanded;
    derivedPanelToggleEl.querySelector('.toggle-arrow').textContent = derivedPanelExpanded ? '▾' : '▸';
  });

  let toastTimer = null;
  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add('visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('visible'), CONFIG.TOAST_DURATION_MS);
  }

  // ═══════════════════════════════════════════════════════════
  // 실시간 미리보기
  // ═══════════════════════════════════════════════════════════

  const PREVIEW_SENTENCES = [
    'いろはにほへと ちりぬるを',
    'カタカナ フォント テスト',
    'がぎぐげご ぱぴぷぺぽ っしょ',      // 합성 품질 확인용
    'わたしの手書きフォント 2026 ABC abc',
  ];

  function isLatinDigitChar(ch) {
    return /[A-Za-z0-9]/.test(ch);
  }

  function getProportionalAdvanceEm(strokes) {
    const bbox = computeBBox(strokes);
    if (!bbox) return 0.38;
    const widthEm = bbox.width / CONFIG.LOGICAL_SIZE + 0.12; // 좌우 여백 0.06em씩
    return Math.max(0.38, widthEm);
  }

  function getPlaceholderAdvanceEm(char) {
    if (char === ' ') return 0.5;
    if (isLatinDigitChar(char)) return 0.5; // 실측 bbox가 없으므로 대략값
    return 1; // 가나·한자·전각 부호 등은 정사각 칸
  }

  function roundRectPath(pctx, x, y, w, h, r) {
    pctx.beginPath();
    pctx.moveTo(x + r, y);
    pctx.arcTo(x + w, y, x + w, y + h, r);
    pctx.arcTo(x + w, y + h, x, y + h, r);
    pctx.arcTo(x, y + h, x, y, r);
    pctx.arcTo(x, y, x + w, y, r);
    pctx.closePath();
  }

  // 미지원 글자: 연회색 둥근 사각형 + 흐린 회색 시스템 폰트 문자
  function drawPlaceholderCell(pctx, w, h, char) {
    pctx.save();
    pctx.fillStyle = '#e5dccb';
    roundRectPath(pctx, 2, 2, w - 4, h - 4, Math.min(w, h) * 0.12);
    pctx.fill();
    if (char !== ' ') {
      pctx.fillStyle = 'rgba(58,52,44,0.3)';
      pctx.font = `${Math.floor(h * 0.6)}px "Pretendard", "Noto Sans KR", sans-serif`;
      pctx.textAlign = 'center';
      pctx.textBaseline = 'middle';
      pctx.fillText(char, w / 2, h / 2 + h * 0.03);
    }
    pctx.restore();
  }

  // 문자 하나를 기준 해상도(REF)의 오프스크린 캔버스에 렌더 (폭은 advanceEm 비율)
  function renderCharOffscreen(char) {
    const REF = CONFIG.PREVIEW_REF_PX;
    const strokes = getGlyphStrokes(char);

    if (!strokes) {
      const advanceEm = getPlaceholderAdvanceEm(char);
      const canvasW = Math.max(1, Math.round(advanceEm * REF));
      const off = document.createElement('canvas');
      off.width = canvasW;
      off.height = REF;
      drawPlaceholderCell(off.getContext('2d'), canvasW, REF, char);
      return { canvas: off, advanceEm };
    }

    const proportional = isLatinDigitChar(char);
    const advanceEm = proportional ? getProportionalAdvanceEm(strokes) : 1;
    const canvasW = Math.max(1, Math.round(advanceEm * REF));
    const off = document.createElement('canvas');
    off.width = canvasW;
    off.height = REF;
    const octx = off.getContext('2d');
    const s = REF / CONFIG.LOGICAL_SIZE;
    if (proportional) {
      const bbox = computeBBox(strokes);
      const bearing = 0.06 * REF;
      renderStrokes(octx, strokes, { scale: s, offsetX: -bbox.minX * s + bearing, offsetY: 0 });
    } else {
      renderStrokes(octx, strokes, { scale: s });
    }
    return { canvas: off, advanceEm };
  }

  // 문자별 렌더 캐시 — 같은 글자는 한 번만 그림. 폰트 크기와 무관한 기준 해상도로 캐시하므로
  // 크기 슬라이더 변경 시에는 무효화 없이 합성(drawImage) 단계에서만 다시 스케일하면 됨.
  const previewCharCache = new Map(); // char -> { canvas, advanceEm }

  function getPreviewCharImage(char) {
    if (previewCharCache.has(char)) return previewCharCache.get(char);
    const result = renderCharOffscreen(char);
    previewCharCache.set(char, result);
    return result;
  }

  function renderPreviewLine(lineEl, text) {
    const fontSizePx = Number(previewSizeSliderEl.value);
    const dpr = window.devicePixelRatio || 1;
    const parts = [];
    let totalWidthPx = 0;
    for (const ch of [...text]) {
      if (ch === ' ') {
        const widthPx = fontSizePx * 0.5;
        parts.push({ space: true, widthPx });
        totalWidthPx += widthPx;
        continue;
      }
      const { canvas: img, advanceEm } = getPreviewCharImage(ch);
      const widthPx = advanceEm * fontSizePx;
      parts.push({ img, widthPx });
      totalWidthPx += widthPx;
    }

    const lineCanvas = document.createElement('canvas');
    lineCanvas.width = Math.max(1, Math.ceil(totalWidthPx * dpr));
    lineCanvas.height = Math.ceil(fontSizePx * dpr);
    lineCanvas.style.width = totalWidthPx + 'px';
    lineCanvas.style.height = fontSizePx + 'px';
    const lctx = lineCanvas.getContext('2d');
    lctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    let x = 0;
    for (const part of parts) {
      if (!part.space) lctx.drawImage(part.img, x, 0, part.widthPx, fontSizePx);
      x += part.widthPx;
    }

    lineEl.innerHTML = '';
    lineEl.appendChild(lineCanvas);
  }

  function refreshPreview() {
    const hasAnyGlyph = getAvailableChars().length > 0;
    previewPlaceholderEl.hidden = hasAnyGlyph;
    previewLinesEl.hidden = !hasAnyGlyph;
    previewFreeRowEl.hidden = !hasAnyGlyph;
    if (!hasAnyGlyph) return;

    previewLinesEl.innerHTML = '';
    for (const sentence of PREVIEW_SENTENCES) {
      const row = document.createElement('div');
      row.className = 'preview-line';
      previewLinesEl.appendChild(row);
      renderPreviewLine(row, sentence);
    }
    renderPreviewLine(previewFreeLineEl, previewFreeInputEl.value);
  }

  let previewDebounceTimer = null;
  function schedulePreviewRerender() {
    if (previewDebounceTimer) clearTimeout(previewDebounceTimer);
    previewDebounceTimer = setTimeout(() => {
      refreshPreview();
      previewDebounceTimer = null;
    }, CONFIG.PREVIEW_DEBOUNCE_MS);
  }

  previewSizeSliderEl.addEventListener('input', () => {
    previewSizeValueEl.textContent = `${previewSizeSliderEl.value}px`;
    refreshPreview(); // 크기 조정은 캐시된 오프스크린 이미지를 다시 스케일만 하므로 즉시 반영
  });

  previewFreeInputEl.addEventListener('input', () => {
    schedulePreviewRerender();
  });

  // S3: 합성 엔진 트리거(파생 글자 캐시 무효화) + 파생 패널·진행바·미리보기 갱신
  function onGlyphChange(char) {
    const affected = getAffectedChars(char);
    for (const c of affected) {
      composedCache.delete(c);
      previewCharCache.delete(c);
    }
    updateDerivedPanelCells(affected);
    updateProgressBar();
    schedulePreviewRerender();
  }

  // ── 글자 완료 시점마다 project.glyphs와 화면(그리드·진행바·합성·미리보기·저장)을 동기화 ──
  function syncCurrentGlyph() {
    const char = state.currentChar;
    if (state.strokes.length > 0) {
      project.glyphs[char] = { strokes: state.strokes, updatedAt: Date.now() };
    } else {
      delete project.glyphs[char];
    }
    updateGlyphCell(char);
    updateGroupTabCount(CHAR_TO_GROUP.get(char));
    onGlyphChange(char);
    scheduleSave();
  }

  // ── 그룹 탭 ──
  let currentGroupId = CHARSET[0].id;

  function renderGroupTabs() {
    groupTabsEl.innerHTML = '';
    for (const g of CHARSET) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'group-tab';
      btn.dataset.group = g.id;
      btn.innerHTML = `<span class="group-label">${g.label}</span><span class="group-count" data-count-for="${g.id}">0/${g.chars.length}</span>`;
      btn.addEventListener('click', () => selectGroup(g.id));
      groupTabsEl.appendChild(btn);
    }
    updateAllGroupCounts();
    highlightActiveGroupTab();
  }

  function updateAllGroupCounts() {
    for (const g of CHARSET) updateGroupTabCount(g.id);
  }

  function updateGroupTabCount(groupId) {
    const g = CHARSET.find((x) => x.id === groupId);
    if (!g) return;
    const done = g.chars.filter(isCharDone).length;
    const el = groupTabsEl.querySelector(`[data-count-for="${groupId}"]`);
    if (el) el.textContent = `${done}/${g.chars.length}`;
  }

  function highlightActiveGroupTab() {
    groupTabsEl.querySelectorAll('.group-tab').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.group === currentGroupId);
    });
  }

  function selectGroup(groupId) {
    currentGroupId = groupId;
    highlightActiveGroupTab();
    renderGlyphGrid();
  }

  // ── 글자 그리드 (선택된 그룹만 렌더 — 157칸 전체를 매번 다시 그리지 않음) ──
  const cellRefs = new Map(); // char -> { wrapper }

  function renderGlyphGrid() {
    glyphGridEl.innerHTML = '';
    cellRefs.clear();
    const group = CHARSET.find((g) => g.id === currentGroupId);
    for (const char of group.chars) {
      const wrapper = document.createElement('button');
      wrapper.type = 'button';
      wrapper.className = 'glyph-cell';
      wrapper.addEventListener('click', () => goToChar(char));
      glyphGridEl.appendChild(wrapper);
      cellRefs.set(char, { wrapper });
      renderCellContent(char);
    }
    markCurrentCellInGrid(state.currentChar);
  }

  function renderCellContent(char) {
    const cell = cellRefs.get(char);
    if (!cell) return; // 다른 그룹이 표시 중 — 탭 전환 시 자동으로 반영됨
    const wrapper = cell.wrapper;
    wrapper.innerHTML = '';
    const glyph = project.glyphs[char];
    if (glyph && glyph.strokes.length > 0) {
      const px = CONFIG.GRID_CELL_SIZE;
      const dpr = window.devicePixelRatio || 1;
      const thumb = document.createElement('canvas');
      thumb.width = px * dpr;
      thumb.height = px * dpr;
      thumb.style.width = px + 'px';
      thumb.style.height = px + 'px';
      renderStrokes(thumb.getContext('2d'), glyph.strokes, { scale: (px * dpr) / CONFIG.LOGICAL_SIZE });
      wrapper.appendChild(thumb);

      const dot = document.createElement('span');
      dot.className = 'glyph-cell-dot';
      wrapper.appendChild(dot);

      wrapper.classList.add('completed');
      wrapper.classList.remove('empty');
    } else {
      const span = document.createElement('span');
      span.className = 'glyph-cell-char';
      span.textContent = char;
      wrapper.appendChild(span);

      wrapper.classList.add('empty');
      wrapper.classList.remove('completed');
    }
  }

  function updateGlyphCell(char) {
    if (!cellRefs.has(char)) return; // 현재 그룹에 표시 중이 아니면 다음 탭 전환 때 반영
    renderCellContent(char);
    markCurrentCellInGrid(state.currentChar);
  }

  function markCurrentCellInGrid(char) {
    glyphGridEl.querySelectorAll('.glyph-cell.current').forEach((el) => el.classList.remove('current'));
    const cell = cellRefs.get(char);
    if (cell) cell.wrapper.classList.add('current');
  }

  // ── 진행 큐: 다음/이전 글자 이동 ──
  function findNextIncomplete(fromChar) {
    const startIdx = ALL_CHARS.indexOf(fromChar);
    for (let offset = 1; offset <= ALL_CHARS.length; offset++) {
      const idx = (startIdx + offset) % ALL_CHARS.length;
      const c = ALL_CHARS[idx];
      if (!isCharDone(c)) return c;
    }
    return null; // 전부 완료
  }

  function goToChar(char) {
    const glyph = project.glyphs[char];
    state.strokes = glyph ? glyph.strokes : [];
    state.currentChar = char;
    project.currentChar = char;
    currentPts = [];
    prevMid = null;
    activePointerId = null;

    redrawAll();
    updateButtonStates();
    updateCharUI();

    const g = CHAR_TO_GROUP.get(char);
    if (g !== currentGroupId) {
      currentGroupId = g;
      highlightActiveGroupTab();
      renderGlyphGrid();
    } else {
      markCurrentCellInGrid(char);
    }
    scheduleSave();
  }

  function goToNextChar() {
    const next = findNextIncomplete(state.currentChar);
    if (next === null) {
      allCompleteBanner.hidden = false;
      return;
    }
    allCompleteBanner.hidden = true;
    goToChar(next);
  }

  function goToPrevChar() {
    const idx = ALL_CHARS.indexOf(state.currentChar);
    const prevIdx = (idx - 1 + ALL_CHARS.length) % ALL_CHARS.length;
    goToChar(ALL_CHARS[prevIdx]);
  }

  prevCharBtn.addEventListener('click', goToPrevChar);
  nextCharBtn.addEventListener('click', goToNextChar);

  // ── 자동 저장 (디바운스 1초) ──
  let saveTimer = null;

  function persistProject() {
    try {
      StorageAdapter.save(project);
      quotaBannerEl.hidden = true;
      renderAutosaveStatus();
    } catch (err) {
      if (err && err.name === 'QuotaExceededError') {
        quotaBannerEl.hidden = false;
      }
    }
  }

  function scheduleSave() {
    project.meta.updatedAt = Date.now();
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      persistProject();
      saveTimer = null;
    }, CONFIG.SAVE_DEBOUNCE_MS);
  }

  window.addEventListener('beforeunload', () => {
    if (saveTimer) {
      clearTimeout(saveTimer);
      saveTimer = null;
    }
    persistProject();
  });

  function renderAutosaveStatus() {
    if (!project.meta.updatedAt) {
      autosaveStatusEl.textContent = '';
      return;
    }
    const diffMin = Math.floor((Date.now() - project.meta.updatedAt) / 60000);
    autosaveStatusEl.textContent = `자동 저장됨 · ${diffMin < 1 ? '방금' : diffMin + '분 전'}`;
  }
  setInterval(renderAutosaveStatus, 60000);

  // ── 전체 초기화 ──
  resetAllBtn.addEventListener('click', () => {
    if (!confirm('모든 글자를 지우고 처음부터 시작할까요? 되돌릴 수 없습니다.')) return;

    StorageAdapter.clear();
    project.version = 1;
    project.meta = { createdAt: Date.now(), updatedAt: Date.now() };
    project.settings = { brushSize: CONFIG.BRUSH_SIZES.normal };
    project.glyphs = {};
    project.currentChar = ALL_CHARS[0];

    state.brushSize = project.settings.brushSize;
    state.strokes = [];
    state.currentChar = ALL_CHARS[0];
    currentPts = [];
    prevMid = null;
    activePointerId = null;

    composedCache.clear();
    previewCharCache.clear();
    lastAvailableCount = 0;

    syncBrushSizeUI();
    redrawAll();
    updateButtonStates();
    updateCharUI();
    allCompleteBanner.hidden = true;
    renderGroupTabs();
    selectGroup(CHARSET[0].id);
    renderDerivedPanel();
    updateProgressBar();
    refreshPreview();
    persistProject();
  });

  // ── 초기화: localStorage 복원 또는 새 프로젝트 ──
  function init() {
    const loaded = StorageAdapter.load();
    if (loaded && loaded.glyphs) {
      project.version = loaded.version || 1;
      project.meta = loaded.meta || { createdAt: Date.now(), updatedAt: 0 };
      project.settings = loaded.settings || { brushSize: CONFIG.BRUSH_SIZES.normal };
      project.glyphs = loaded.glyphs || {};
      project.currentChar = (loaded.currentChar && ALL_CHARS.includes(loaded.currentChar)) ? loaded.currentChar : ALL_CHARS[0];
    } else {
      project.version = 1;
      project.meta = { createdAt: Date.now(), updatedAt: 0 };
      project.settings = { brushSize: CONFIG.BRUSH_SIZES.normal };
      project.glyphs = {};
      project.currentChar = ALL_CHARS[0];
    }

    state.brushSize = project.settings.brushSize;
    state.currentChar = project.currentChar;
    const glyph = project.glyphs[state.currentChar];
    state.strokes = glyph ? glyph.strokes : [];
    currentGroupId = CHAR_TO_GROUP.get(state.currentChar);

    renderGroupTabs();
    selectGroup(currentGroupId);
    syncBrushSizeUI();
    updateCharUI();
    renderAutosaveStatus(); // updatedAt=0이면 상태 텍스트 비움 (아직 저장된 적 없음)
    resizeCanvas();
    updateButtonStates();

    // 파생 패널·미리보기 초기 렌더 (합성은 저장되지 않으므로 복원된 원본에서 항상 재계산됨)
    renderDerivedPanel();
    previewSizeSliderEl.min = CONFIG.PREVIEW_MIN_SIZE;
    previewSizeSliderEl.max = CONFIG.PREVIEW_MAX_SIZE;
    previewSizeSliderEl.value = CONFIG.PREVIEW_DEFAULT_SIZE;
    previewSizeValueEl.textContent = `${CONFIG.PREVIEW_DEFAULT_SIZE}px`;
    lastAvailableCount = getAvailableChars().length; // 최초 로드 시 강조 애니메이션 방지
    updateProgressBar();
    refreshPreview();
  }

  init();
</script>

</body>
</html>
